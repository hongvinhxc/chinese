<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>词语连连看 - 配对游戏</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1e5a8a 0%, #0e3a5a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard SE', 'PingFang SC', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 1200px;
            width: 100%;
            background: #fef3c7;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,245,200,0.8) 0%, #ffe6b3 100%);
            border-radius: 72px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 4px rgba(255,255,200,0.8);
            padding: 20px 30px 35px;
            transition: all 0.2s;
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            margin: 0 0 5px 0;
            color: #3b2a1f;
            text-shadow: 4px 4px 0 #ffc857;
            letter-spacing: 2px;
            word-break: keep-all;
        }

        .sub {
            text-align: center;
            color: #5a3e2b;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 25px;
            border-top: 2px dashed #e0a878;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-top: 8px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #2c221b;
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 30px;
            color: #ffecb3;
            flex-wrap: wrap;
            gap: 12px;
        }

        .score-box {
            background: #00000055;
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.7rem;
            font-weight: bold;
        }

        .score-box span:first-child {
            font-size: 1rem;
            font-weight: normal;
        }

        .message-area {
            background: #ffde9c;
            color: #5a2e0e;
            padding: 8px 20px;
            border-radius: 32px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .reset-btn {
            background: #ffaa33;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 6px 22px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s linear;
            color: #2c1c0c;
            box-shadow: 0 4px 0 #a05e15;
        }

        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a05e15;
        }

        .game-board {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        .column {
            flex: 1;
            min-width: 220px;
            background: #fffaf0;
            border-radius: 48px;
            padding: 20px 16px;
            box-shadow: 0 12px 18px rgba(0,0,0,0.2);
        }

        .column h2 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 20px 0;
            color: #b45f2b;
            border-bottom: 3px dotted #f7bc5a;
            display: inline-block;
            width: 100%;
        }

        .words-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .word-card {
            background: white;
            border-radius: 60px;
            padding: 14px 12px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: #3e2a1f;
            box-shadow: 0 5px 0 #cbad7a;
            cursor: pointer;
            transition: 0.05s linear;
            border: 2px solid #f5cf9b;
            letter-spacing: 2px;
        }

        .word-card.selected {
            background: #ffdd99;
            border: 3px solid #e0841e;
            color: #ac4e0c;
            transform: scale(0.98);
            box-shadow: 0 2px 0 #a5662a;
        }

        .word-card.matched {
            background: #9fd3a3;
            border: 2px solid #2c6e2c;
            color: #1a4a1a;
            text-decoration: line-through;
            text-decoration-thickness: 3px;
            text-decoration-color: #1f5e1f;
            cursor: default;
            opacity: 0.7;
            filter: grayscale(0.1);
            box-shadow: none;
            transform: none;
        }

        .word-card.matched::after {
            content: " ✓";
            font-size: 1.5rem;
            font-weight: bold;
        }

        .word-card.disabled, .word-card.matched {
            pointer-events: none;
        }

        .congrats {
            text-align: center;
            margin-top: 25px;
            background: #d4e66e;
            padding: 12px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #2b4d0c;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0% { transform: scale(0.9); opacity: 0; }
            80% { transform: scale(1.02);}
            100% { transform: scale(1);}
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #7f613f;
        }

        @media (max-width: 700px) {
            .game-container {
                padding: 16px;
            }
            .word-card {
                font-size: 1.2rem;
                padding: 10px 6px;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>📖 词语连连看 ✨</h1>
    <div style="text-align:center;">
        <div class="sub">🔗 点击左边词语 → 再点击右边词语，组成正确词组！</div>
    </div>

    <div class="info-bar">
        <div class="score-box"><span>⭐ 得分</span> <span id="scoreValue">0</span></div>
        <div class="message-area" id="messageBox">✨ 来连线吧～</div>
        <button class="reset-btn" id="resetGameBtn">🔄 新的一局</button>
    </div>

    <div class="game-board">
        <div class="column">
            <h2>📌 左边 · 词头</h2>
            <div class="words-list" id="leftList"></div>
        </div>

        <div class="column">
            <h2>🎯 右边 · 词尾</h2>
            <div class="words-list" id="rightList"></div>
        </div>
    </div>
    <footer>💡 提示：必须搭配成日常合理词组，例如“减少 + 使用” ✅</footer>
</div>

<script>
    const PAIRS_RAW = [
        { left: "减少", right: "使用" },
        { left: "水的", right: "温度" },
        { left: "丢", right: "垃圾" },
        { left: "乘坐", right: "电梯" },
        { left: "塑料", right: "袋" },
        { left: "拒绝", right: "帮忙" },
        { left: "鼓励", right: "大家" },
        { left: "空调", right: "的温度" }
    ];

    let leftItems = PAIRS_RAW.map((pair, idx) => ({
        id: idx,
        text: pair.left,
        matched: false,
        rightMatch: pair.right
    }));

    let rightItems = [];
    function buildShuffledRight() {
        const rights = PAIRS_RAW.map((pair, idx) => ({
            id: idx,
            text: pair.right,
            matched: false,
            leftMatch: pair.left
        }));
        for (let i = rights.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [rights[i], rights[j]] = [rights[j], rights[i]];
        }
        return rights;
    }

    let currentLeftId = null;
    let score = 0;
    let gameCompleted = false;

    const leftContainer = document.getElementById("leftList");
    const rightContainer = document.getElementById("rightList");
    const scoreSpan = document.getElementById("scoreValue");
    const messageBox = document.getElementById("messageBox");
    const resetBtn = document.getElementById("resetGameBtn");

    function render() {
        leftContainer.innerHTML = "";
        leftItems.forEach(item => {
            const card = document.createElement("div");
            card.className = "word-card";
            if (item.matched) card.classList.add("matched");
            if (currentLeftId === item.id && !item.matched) card.classList.add("selected");
            card.textContent = item.text;
            if (!item.matched) {
                card.addEventListener("click", (e) => {
                    e.stopPropagation();
                    if (gameCompleted) {
                        messageBox.innerText = "🏆 游戏已完成，点「新的一局」继续挑战吧！";
                        return;
                    }
                    if (currentLeftId === item.id) {
                        currentLeftId = null;
                        messageBox.innerText = "👆 已取消选择";
                    } else {
                        currentLeftId = item.id;
                        messageBox.innerText = `✅ 选中：“${item.text}” → 点击右侧配对`;
                    }
                    render();
                });
            }
            leftContainer.appendChild(card);
        });

        rightContainer.innerHTML = "";
        rightItems.forEach(item => {
            const card = document.createElement("div");
            card.className = "word-card";
            if (item.matched) card.classList.add("matched");
            card.textContent = item.text;
            if (!item.matched) {
                card.addEventListener("click", (e) => {
                    e.stopPropagation();
                    if (gameCompleted) {
                        messageBox.innerText = "🎉 已完成所有配对！按「新的一局」继续玩吧～";
                        return;
                    }
                    if (currentLeftId === null) {
                        messageBox.innerText = "⚠️ 请先点击左边词语，再点右边配对！";
                        return;
                    }
                    const selectedLeft = leftItems.find(l => l.id === currentLeftId);
                    if (!selectedLeft || selectedLeft.matched) {
                        currentLeftId = null;
                        render();
                        messageBox.innerText = "🔄 选中的左侧已经配对过了，重新选择吧";
                        return;
                    }
                    const expectedRight = selectedLeft.rightMatch;
                    if (item.text === expectedRight && item.leftMatch === selectedLeft.text) {
                        if (!selectedLeft.matched && !item.matched) {
                            selectedLeft.matched = true;
                            item.matched = true;
                            score += 10;
                            scoreSpan.innerText = score;
                            messageBox.innerText = `🎉 配对成功！ “${selectedLeft.text} + ${item.text}”  +10分！`;

                            currentLeftId = null;

                            const allMatched = leftItems.every(l => l.matched === true) && rightItems.every(r => r.matched === true);
                            if (allMatched) {
                                gameCompleted = true;
                                messageBox.innerText = "🏆 完美！所有词组都连对了！ 🏆";
                                const congratsDiv = document.createElement("div");
                                congratsDiv.className = "congrats";
                                congratsDiv.innerText = "🎊 词语大师！ 满分完成 🎊";
                                document.querySelector(".game-board").after(congratsDiv);
                                setTimeout(() => congratsDiv.remove(), 3000);
                            }
                            render();
                        } else {
                            currentLeftId = null;
                            render();
                            messageBox.innerText = "⏳ 这个词已经配对过了！";
                        }
                    } else {
                        messageBox.innerText = `❌ 配对错误！“${selectedLeft.text}” 不能和 “${item.text}” 配对，再试试看～ -0分`;
                        currentLeftId = null;
                        render();
                        const boardDiv = document.querySelector(".game-board");
                        boardDiv.style.transform = "translateX(4px)";
                        setTimeout(() => boardDiv.style.transform = "", 100);
                    }
                });
            }
            rightContainer.appendChild(card);
        });
    }

    function resetGame() {
        leftItems = PAIRS_RAW.map((pair, idx) => ({
            id: idx,
            text: pair.left,
            matched: false,
            rightMatch: pair.right
        }));
        rightItems = buildShuffledRight();
        currentLeftId = null;
        score = 0;
        gameCompleted = false;
        scoreSpan.innerText = "0";
        messageBox.innerText = "🌟 新的一局！左边选词，右边配对 🌟";
        const oldCongrats = document.querySelector(".congrats");
        if(oldCongrats) oldCongrats.remove();
        render();
    }

    resetBtn.addEventListener("click", () => {
        resetGame();
    });

    resetGame();
</script>
</body>
</html>
