<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>越中词汇学习游戏 - Học từ vựng Việt - Trung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-size: 2.8em;
            color: #2d3436;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 1.3em;
            color: #636e72;
            font-weight: 400;
        }

        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .lesson-card {
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            border-radius: 15px;
            padding: 30px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .lesson-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            transition: opacity 0.3s ease;
        }

        .lesson-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .lesson-card:hover::before {
            opacity: 0;
        }

        .lesson-number {
            font-size: 3em;
            font-weight: bold;
            opacity: 0.3;
            position: absolute;
            top: 10px;
            right: 20px;
        }

        .lesson-icon {
            font-size: 3em;
            margin-bottom: 15px;
            display: block;
        }

        .lesson-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .lesson-desc {
            font-size: 1em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid #dfe6e9;
            color: #636e72;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #0984e3;
        }

        .stat-label {
            font-size: 1em;
            color: #636e72;
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 2em;
            }
            
            .lessons-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="main-title">🎮 越中词汇学习游戏 🎮</h1>
            <p class="subtitle">Học từ vựng Việt - Trung qua trò chơi ghép thẻ</p>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalLessons">0</div>
                <div class="stat-label">Bài học</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">60</div>
                <div class="stat-label">Giây/bài</div>
            </div>
        </div>

        <div class="lessons-grid" id="lessonsContainer">
            <!-- Các bài học sẽ được tạo tự động bởi JavaScript -->
        </div>

        <div class="footer">
            <p>💡 Mẹo: Hoàn thành nhanh để được điểm thưởng thời gian!</p>
            <p style="margin-top: 10px; font-size: 0.9em;">Chúc bạn học tập vui vẻ! 加油！</p>
        </div>
    </div>

    <script>
        // MẢNG CHỨA THÔNG TIN CÁC BÀI HỌC
        // Để thêm bài học mới, chỉ cần thêm object mới vào mảng này
        const lessons = [
            {
                file: "1.html",
                title: "Bài 1: Thời tiết",
                titleChinese: "第1课：天气",
                description: "Học từ vựng về thời tiết, mùa và nhiệt độ",
                icon: "🌤️"
            },
            {
                file: "2.html",
                title: "Bài 2: Điện thoại",
                titleChinese: "第2课：电话",
                description: "Học từ vựng về gọi điện và đối thoại",
                icon: "📞"
            },
            {
                file: "3.html",
                title: "Bài 3: Đổi tiền & Giao tiếp",
                titleChinese: "第3课：换钱和交流",
                description: "Học từ vựng về đổi tiền, xưng hô và giao tiếp hàng ngày",
                icon: "💱"
            },
            {
                file: "4.html",
                title: "Bài 4: Kết hợp từ vựng hàng ngày Việt-Trung",
                titleChinese: "🇻🇳🇨🇳 越中日常词汇配对 🇨🇳🇻🇳",
                description: "Kết hợp từ vựng hàng ngày Việt-Trung",
                icon: "💱"
            },
            {
                file: "5.html",
                title: "Bài 5: Ngân hàng & Tài chính",
                titleChinese: "第5课：金融词汇",
                description: "Học từ vựng về gửi tiền, lãi suất, nghiệp vụ ngân hàng",
                icon: "🏦"
            },
            {
                file: "6.html",
                title: "Bài 6: Ghép cụm từ tiếng Trung",
                titleChinese: "词语连连看",
                description: "Ghép phần đầu và phần cuối để tạo cụm từ hàng ngày (减少使用, 丢垃圾...)",
                icon: "🔗"
            }
            // Thêm bài học mới ở đây, ví dụ:
            // {
            //     file: "4.html",
            //     title: "Bài 4: Tên bài học",
            //     titleChinese: "第4课：课程名",
            //     description: "Mô tả bài học",
            //     icon: "🎯"
            // }
        ];

        // HÀM TẠO DANH SÁCH BÀI HỌC
        function renderLessons() {
            const container = document.getElementById('lessonsContainer');
            container.innerHTML = '';

            lessons.forEach((lesson, index) => {
                const card = document.createElement('a');
                card.href = lesson.file;
                card.className = 'lesson-card';
                
                card.innerHTML = `
                    <span class="lesson-number">${index + 1}</span>
                    <span class="lesson-icon">${lesson.icon}</span>
                    <div class="lesson-title">${lesson.title}</div>
                    <div class="lesson-title" style="font-size: 1.2em; opacity: 0.8;">${lesson.titleChinese}</div>
                    <div class="lesson-desc">${lesson.description}</div>
                `;
                
                container.appendChild(card);
            });

            // Cập nhật số lượng bài học
            document.getElementById('totalLessons').textContent = lessons.length;
        }

        // Tự động render khi trang load
        document.addEventListener('DOMContentLoaded', renderLessons);
    </script>
</body>
</html>
